name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN is not set in GitHub Secrets!"
            exit 1
          fi
          git config --global user.email "sht4bharat@gmail.com"
          git config --global user.name "SHT4BHARAT"
          git remote add hf https://huggingface.co/spaces/sht4bharat/openenv-cloudaudit
          git config --global credential.helper store
          echo "https://sht4bharat:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          git push hf main --force
